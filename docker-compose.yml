version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: vectory-db
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    networks:
      - vectory-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vectoruser}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vectory-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    networks:
      - vectory-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: vectory-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file: .env
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - vectory-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vectory-backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "${BACKEND_PORT:-8000}:${BACKEND_PORT:-8000}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - vectory-network
    volumes:
      - ./backend/app:/app/app
      - uploads:/app/uploads

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vectory-celery
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info
    env_file: .env
    depends_on:
      - postgres
      - redis
      - minio
    networks:
      - vectory-network
    volumes:
      - ./backend/app:/app/app
      - uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:${BACKEND_PORT:-8000}}
    container_name: vectory-frontend
    restart: unless-stopped
    env_file: .env
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:3000"
    depends_on:
      - backend
    networks:
      - vectory-network
    volumes:
      - ./frontend/src:/app/src
      - frontend_node_modules:/app/node_modules

volumes:
  postgres_data:
  redis_data:
  minio_data:
  uploads:
  frontend_node_modules:

networks:
  vectory-network:
    driver: bridge
